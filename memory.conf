# Claude Custom Memory Configuration
# ====================================

# How often the cron job runs (in hours)
# Used by install.sh to set up the cron schedule
interval_hours=1

# Short memory rolling window (in hours)
# Messages older than this are excluded from short-memory.md
short_memory_hours=3

# Maximum entries in long-memory.md before oldest are pruned
long_memory_max_entries=500

# Enable AI-powered summarization (requires ANTHROPIC_API_KEY)
# When false, uses mechanical extraction (free, no API calls)
# When true, calls claude CLI to summarize sessions
summarize=false
